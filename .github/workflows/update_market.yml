# Daily market update at 6:00 AM ET
# 6am ET = 11:00 UTC (EST) / 10:00 UTC (EDT)
name: Update Market

on:
  schedule:
    - cron: "0 11 * * *"
  workflow_dispatch:

jobs:
  update:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: "3.12"

      - name: Install dependencies
        run: |
          cd engine
          pip install -r requirements.txt

      - name: Run update_market
        env:
          DATABASE_URL: ${{ secrets.DATABASE_URL }}
        run: |
          cd engine
          python scripts/update_market.py --season 2025-26
